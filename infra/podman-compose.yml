version: "3.9"

# =====================================================================
# AIChatBot 全栈容器化（Phase 1）
#
# 三处 .env 各司其职：
#   - infra/.env     ：编排层（postgres + 端口映射 + 共享密钥），用于占位符 ${...} 插值
#   - backend/.env   ：后端运行时配置（CORS/JWT/Qwen/...），通过 env_file 注入 backend
#   - frontend/.env  ：前端运行时配置（VITE_*），通过 env_file 注入 frontend
#
# 数据库连接串由 compose 在 backend.environment 中拼装注入，避免重复维护密码。
# =====================================================================

services:
  postgres:
    image: docker.io/pgvector/pgvector:pg16
    container_name: aichatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aichatbot}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-app_pwd_change_me}
      BIZ_RO_PASSWORD: ${BIZ_RO_PASSWORD:-biz_ro_pwd_change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - aichatbot-pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./postgres/init-roles.sh:/docker-entrypoint-initdb.d/02-init-roles.sh:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-aichatbot}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: aichatbot-backend:dev
    container_name: aichatbot-backend
    restart: unless-stopped
    # 后端业务配置（CORS/JWT/Qwen/APP_*）从 backend/.env 注入
    env_file:
      - ../backend/.env
    # 跨服务变量（数据库连接串）由 compose 用 infra/.env 中的密码插值生成
    environment:
      META_DB_URL: postgresql+psycopg://app_user:${APP_DB_PASSWORD:-app_pwd_change_me}@postgres:5432/${POSTGRES_DB:-aichatbot}
      BIZ_DB_URL: postgresql+psycopg://biz_ro:${BIZ_RO_PASSWORD:-biz_ro_pwd_change_me}@postgres:5432/${POSTGRES_DB:-aichatbot}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../backend/app:/app/app:Z
      - ../backend/tests:/app/tests:Z
      - ../backend/alembic:/app/alembic:Z
      - ../backend/alembic.ini:/app/alembic.ini:Z
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 8s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: aichatbot-frontend:dev
    container_name: aichatbot-frontend
    restart: unless-stopped
    # 前端业务配置（VITE_PROXY_TARGET / 轮询开关）从 frontend/.env 注入
    env_file:
      - ../frontend/.env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../frontend/src:/app/src:Z
      - ../frontend/public:/app/public:Z
      - ../frontend/index.html:/app/index.html:Z
      - ../frontend/vite.config.ts:/app/vite.config.ts:Z
      - ../frontend/tsconfig.json:/app/tsconfig.json:Z
      - ../frontend/vitest.setup.ts:/app/vitest.setup.ts:Z
      - ../frontend/package.json:/app/package.json:Z
      - aichatbot-frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  aichatbot-pgdata:
    name: aichatbot-pgdata
  aichatbot-frontend-node-modules:
    name: aichatbot-frontend-node-modules
