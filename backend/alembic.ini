# =====================================================================
# Alembic configuration — AIChatBot
#
# 数据库连接 URL **不在此声明**：env.py 会按优先级读取
#   1) 环境变量 META_DB_URL（容器内由 podman-compose 注入）
#   2) app.core.config.get_settings().meta_db_url（本地兜底）
# 这样保证：
#   - 同一份 alembic.ini 既可在容器内 / 也可在本地 IDE 直接运行
#   - 不会把生产库密码留进仓库
# =====================================================================

[alembic]
script_location = alembic

# 迁移文件命名：0001_short_slug.py（按数字排序，比时间戳更直观）
file_template = %%(rev)s_%%(slug)s

# 多 schema 比对必须开
prepend_sys_path = .
timezone = UTC

# autogenerate 时按字母序而非定义序排列字段，diff 更稳定
sqlalchemy.url = driver://user:pass@host/db   ; placeholder; env.py 会覆盖

[post_write_hooks]
# 生成的迁移文件先过 ruff 修一下，避免风格污染
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
